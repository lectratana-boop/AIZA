<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aiza</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
/* === GARDE TON CSS D'ORIGINE ICI === */
/* ... (Tes styles :root, body, .pg, etc.) ... */
#pgL:not(.on) { display: none; }
</style>
</head>
<body>

<div id="splash"><h1>AIZA</h1></div>

<script>
// ==========================================
// 1. CONFIGURATION FIREBASE (À REMPLIR)
// ==========================================
const firebaseConfig = {
  apiKey: "AIzaSyBY_zHJAaNLtXDBlD1TYMzALlMlMHNBwWk",
  authDomain: "aiza-38b31.firebaseapp.com",
  projectId: "aiza-38b31",
  storageBucket: "aiza-38b31.firebasestorage.app",
  messagingSenderId: "850157491678",
  appId: "1:850157491678:web:614b2b70b934cf09fcb94f",
};

// Initialisation
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// ==========================================
// 2. VARIABLES D'ÉTAT
// ==========================================
let CU = null; 
let cP = 'home';
let items = []; // Remplacera tes données locales

// ==========================================
// 3. LOGIQUE DE CONNEXION (SÉCURITÉ)
// ==========================================

// Observateur de connexion Firebase
auth.onAuthStateChanged(async (user) => {
  if (user) {
    // 1. Récupérer le profil depuis Firestore
    const userDoc = await db.collection('users').doc(user.uid).get();
    
    if (userDoc.exists) {
      CU = { id: user.uid, ...userDoc.data() };
    } else {
      // Premier login : créer le profil "user" par défaut
      CU = { id: user.uid, em: user.email, rl: 'user', pr: false };
      await db.collection('users').doc(user.uid).set(CU);
    }
    
    // 2. Lancer l'app si connecté
    enterApp();
  } else {
    // 3. Afficher l'écran de login si non connecté
    document.getElementById('splash').classList.add('off');
    go('L'); // Affiche pgL (ton formulaire de login)
  }
});

function enterApp() {
  document.getElementById('splash').classList.add('off');
  document.getElementById('hdr').classList.add('v');
  document.getElementById('bnav').classList.add('v');
  
  // Masquer/Afficher les éléments Admin selon le rôle (rl)
  const adminBtn = document.querySelector('[onclick*="admin"]'); // Si tu as un bouton admin
  if(adminBtn) adminBtn.style.display = (CU.rl === 'admin') ? 'block' : 'none';

  go('home');
  ref(); // Charger tes données depuis Firestore
}

// Remplacement de ta fonction loginSubmit
async function loginSubmit(e) {
  e.preventDefault();
  const em = document.getElementById('le').value.trim();
  const pw = document.getElementById('lp').value;
  
  try {
    // Firebase gère la vérification
    await auth.signInWithEmailAndPassword(em, pw);
    toast('Connexion...', 'ok');
  } catch (err) {
    // Si compte inexistant, on propose de le créer ou on affiche l'erreur
    try {
      await auth.createUserWithEmailAndPassword(em, pw);
      toast('Compte créé !', 'ok');
    } catch (e2) {
      toast('Erreur: ' + err.message, 'no');
    }
  }
  return false;
}

function logout() {
  auth.signOut().then(() => location.reload());
}

// ==========================================
// 4. SYNCHRONISATION DES DONNÉES (CRUD)
// ==========================================

// Remplacement de ta fonction ref() pour Firestore
async function ref() {
  if (!CU) return;
  
  // On récupère uniquement les objets de l'utilisateur connecté
  const snap = await db.collection('items').where('uid', '==', CU.id).get();
  items = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
  
  // Ici, appelle ta fonction d'affichage d'origine (ex: rL())
  // rL(); 
}

// Remplacement de ta fonction save()
async function saveItem(data) {
  try {
    await db.collection('items').add({
      ...data,
      uid: CU.id,
      at: firebase.firestore.FieldValue.serverTimestamp()
    });
    toast('Enregistré dans le Cloud', 'ok');
    ref();
  } catch (e) {
    toast('Erreur de sauvegarde', 'no');
  }
}

// ==========================================
// 5. FONCTIONS UI (GARDÉES TEL QUEL)
// ==========================================
function go(id) {
  cP = id;
  document.querySelectorAll('.pg').forEach(p => p.classList.remove('on'));
  const target = document.getElementById('pg' + id);
  if(target) target.classList.add('on');
}

function toast(m, s) {
  const t = document.getElementById('tst');
  t.innerText = m; t.className = 'v ' + s;
  setTimeout(() => t.className = '', 3000);
}

// ... (Garde le reste de tes fonctions : openM, closeM, etc.) ...
</script>
</body>
</html>
