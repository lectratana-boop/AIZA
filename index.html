<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application de Suivi - Objets</title>
    <style>
        :root { --primary: #6C63FF; --bg: #F0F2F5; --white: #ffffff; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .card { background: var(--white); padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 15px; }
        .input-group { margin-bottom: 10px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 0.9em; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
        .row-flex { display: flex; gap: 5px; }
        .btn { border: none; padding: 10px; border-radius: 8px; cursor: pointer; color: white; font-weight: bold; }
        .btn-add { background: #00C896; }
        .btn-del { background: #FF4757; }
        .btn-primary { background: var(--primary); width: 100%; margin-top: 10px; }
        #photo-preview { width: 100%; max-height: 200px; object-fit: cover; border-radius: 8px; display: none; margin-top: 10px; }
        .search-bar { margin-bottom: 15px; position: sticky; top: 0; z-index: 100; }
        .item-list { margin-top: 20px; }
    </style>
</head>
<body>

    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Rechercher par Customer, Style ou OC..." oninput="filtrerListe()">
    </div>

    <div class="card">
        <h3>Nouvel Objet</h3>
        
        <div class="input-group">
            <label>CUSTOMER *</label>
            <div class="row-flex">
                <select id="selCustomer"></select>
                <button class="btn btn-add" onclick="ajouterOption('selCustomer', 'Client')">+</button>
                <button class="btn btn-del" onclick="supprimerOption('selCustomer')">-</button>
            </div>
        </div>

        <div class="input-group">
            <label>Style *</label>
            <input type="text" id="inStyle" placeholder="Ex: Slim Fit">
        </div>

        <div class="input-group">
            <label>Color *</label>
            <div class="row-flex">
                <select id="selColor">
                    <option>Bleu</option>
                    <option>Noir</option>
                    <option>Blanc</option>
                </select>
                <button class="btn btn-add" onclick="ajouterOption('selColor', 'Couleur')">+</button>
            </div>
        </div>

        <div class="input-group">
            <label>PO Fabric</label>
            <input type="text" id="inFabric" placeholder="Type de tissu">
        </div>

        <div class="input-group">
            <label>OC Number</label>
            <input type="number" id="inOC" placeholder="Numéro OC">
        </div>

        <div class="row-flex">
            <button class="btn btn-primary" onclick="prendrePhoto()">📸 Prendre Photo</button>
            <button class="btn btn-primary" style="background:#46b3ff" onclick="localiser()">📍 Localiser</button>
        </div>
        <img id="photo-preview" src="" alt="Aperçu">
        <p id="geo-status" style="font-size: 0.8em; color: #666;"></p>

        <button class="btn btn-primary" style="background:#000" onclick="sauvegarderObjet()">Enregistrer l'objet</button>
    </div>

    <div id="listeObjets" class="item-list"></div>

    <script>
        let db = JSON.parse(localStorage.getItem('app_data')) || { objects: [], customers: ["Cap Union", "Jcrew", "Everlane", "MacDonald", "Faherty"] };
        let currentPhoto = "";
        let currentCoords = null;

        // Initialisation des listes
        function initLists() {
            const sel = document.getElementById('selCustomer');
            sel.innerHTML = "";
            db.customers.forEach(c => {
                let opt = document.createElement('option');
                opt.value = c; opt.text = c;
                sel.add(opt);
            });
            afficherListe(db.objects);
        }

        // --- Fonctions Dynamiques (Add/Delete) ---
        function ajouterOption(id, label) {
            const val = prompt(`Ajouter ${label} :`);
            if(val) {
                const sel = document.getElementById(id);
                let opt = document.createElement('option');
                opt.value = val; opt.text = val;
                sel.add(opt);
                if(id === 'selCustomer') { db.customers.push(val); save(); }
            }
        }

        function supprimerOption(id) {
            const sel = document.getElementById(id);
            if(confirm("Supprimer l'option sélectionnée ?")) {
                if(id === 'selCustomer') {
                    db.customers = db.customers.filter(c => c !== sel.value);
                    save();
                }
                sel.remove(sel.selectedIndex);
            }
        }

        // --- Photo & GPS ---
        function prendrePhoto() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.capture = 'environment';
            input.onchange = e => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = () => {
                    currentPhoto = reader.result;
                    const img = document.getElementById('photo-preview');
                    img.src = currentPhoto;
                    img.style.display = 'block';
                };
                reader.readAsDataURL(file);
            };
            input.click();
        }

        function localiser() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    currentCoords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    document.getElementById('geo-status').innerText = `📍 Fixé : ${currentCoords.lat.toFixed(4)}, ${currentCoords.lng.toFixed(4)}`;
                });
            }
        }

        // --- Recherche Dynamique ---
        function filtrerListe() {
            const val = document.getElementById('searchInput').value.toLowerCase();
            const resultats = db.objects.filter(obj => 
                obj.customer.toLowerCase().includes(val) || 
                obj.style.toLowerCase().includes(val) || 
                obj.oc.toString().includes(val)
            );
            afficherListe(resultats);
        }

        function sauvegarderObjet() {
            const obj = {
                id: Date.now(),
                customer: document.getElementById('selCustomer').value,
                style: document.getElementById('inStyle').value,
                color: document.getElementById('selColor').value,
                fabric: document.getElementById('inFabric').value,
                oc: document.getElementById('inOC').value,
                photo: currentPhoto,
                coords: currentCoords
            };
            db.objects.push(obj);
            save();
            alert("Objet ajouté !");
            location.reload(); 
        }

        function save() { localStorage.setItem('app_data', JSON.stringify(db)); }

        function afficherListe(liste) {
            const container = document.getElementById('listeObjets');
            container.innerHTML = "";
            liste.forEach(obj => {
                container.innerHTML += `
                    <div class="card">
                        <b>${obj.customer}</b> - ${obj.style} (${obj.color})<br>
                        <small>OC: ${obj.oc} | Tissu: ${obj.fabric}</small>
                        ${obj.photo ? `<img src="${obj.photo}" style="width:100%; border-radius:8px; margin-top:5px;">` : ''}
                        ${obj.coords ? `<p style="font-size:0.7em">📍 Localisation sauvegardée</p>` : ''}
                    </div>
                `;
            });
        }

        window.onload = initLists;
    </script>
</body>
</html>
